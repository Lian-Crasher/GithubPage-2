<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">水的物态变化循环示意图</title>
  <desc id="desc">冰、水、水蒸气和霜通过熔化、凝固、汽化、液化、升华、凝华互相转化，温度计显示加热过程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8f2f5"/>
      <stop offset="0.58" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#f5f1df"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#36c5d2" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#0f98a8" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-20%" width="136%" height="145%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#23415a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowHot" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#ef6f61"/>
    </marker>
    <marker id="arrowCold" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#1aa6b7"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="112" y="104" width="1376" height="548" rx="34" fill="#ffffff" stroke="#d6e8ef" stroke-width="4" filter="url(#softShadow)"/>
  <rect x="92" y="698" width="1416" height="100" rx="30" fill="#cfe6dc"/>

  <g aria-label="固态冰">
    <rect x="190" y="372" width="92" height="70" rx="12" fill="#8fd4f2" stroke="#2f8fbd" stroke-width="5"/>
    <rect x="274" y="330" width="92" height="70" rx="12" fill="#8fd4f2" stroke="#2f8fbd" stroke-width="5"/>
    <rect x="342" y="402" width="92" height="70" rx="12" fill="#8fd4f2" stroke="#2f8fbd" stroke-width="5"/>
    <text x="236" y="548" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="900">固态：冰</text>
  </g>

  <g aria-label="液态水和温度计">
    <path d="M654 252 L892 252 C922 252 942 274 942 304 L942 598 C942 628 922 648 892 648 L654 648 C624 648 604 628 604 598 L604 304 C604 274 624 252 654 252 Z" fill="#f8fdff" stroke="#9bb8c5" stroke-width="7"/>
    <ellipse cx="773" cy="252" rx="118" ry="24" fill="#f8fdff" stroke="#9bb8c5" stroke-width="7"/>
    <path d="M628 488 C680 466 866 466 918 488 L918 626 L628 626 Z" fill="url(#water)"/>
    <rect x="770" y="178" width="20" height="376" rx="10" fill="#a8c3cf"/>
    <rect x="776" y="210" width="8" height="300" rx="4" fill="#ef6f61"/>
    <circle cx="780" cy="560" r="32" fill="#ef6f61"/>
    <path d="M708 666 C746 706 814 706 852 666" fill="none" stroke="#ef6f61" stroke-width="9" stroke-linecap="round"/>
    <path d="M680 690 C730 742 830 742 880 690" fill="none" stroke="#ef6f61" stroke-width="7" stroke-linecap="round" opacity="0.56"/>
    <text x="682" y="144" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="900">液态：水</text>
    <text x="666" y="184" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="800">加热、沸腾、温度读数</text>
  </g>

  <g aria-label="气态水蒸气">
    <path d="M1138 398 C1080 344 1088 250 1162 208" fill="none" stroke="#9bb8c5" stroke-width="12" stroke-linecap="round"/>
    <path d="M1216 398 C1158 344 1166 250 1240 208" fill="none" stroke="#9bb8c5" stroke-width="12" stroke-linecap="round"/>
    <path d="M1294 398 C1236 344 1244 250 1318 208" fill="none" stroke="#9bb8c5" stroke-width="12" stroke-linecap="round"/>
    <text x="1110" y="548" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="900">气态：水蒸气</text>
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.92">
      <line x1="1238" y1="454" x2="1238" y2="526"/>
      <line x1="1202" y1="490" x2="1274" y2="490"/>
      <line x1="1213" y1="465" x2="1263" y2="515"/>
      <line x1="1263" y1="465" x2="1213" y2="515"/>
    </g>
    <rect x="1124" y="426" width="250" height="112" rx="26" fill="#e4f4fb" stroke="#9bb8c5" stroke-width="5" opacity="0.9"/>
  </g>

  <g aria-label="变化箭头">
    <path d="M450 374 C512 284 560 248 618 230" fill="none" stroke="#ef6f61" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHot)"/>
    <text x="472" y="286" fill="#ef6f61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="900">熔化</text>
    <path d="M604 590 C540 618 488 614 438 560" fill="none" stroke="#1aa6b7" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowCold)"/>
    <text x="492" y="650" fill="#1aa6b7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="900">凝固</text>
    <path d="M942 296 C1008 236 1062 218 1124 226" fill="none" stroke="#ef6f61" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHot)"/>
    <text x="982" y="246" fill="#ef6f61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="900">汽化</text>
    <path d="M1124 488 C1044 538 1000 560 942 570" fill="none" stroke="#1aa6b7" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowCold)"/>
    <text x="1014" y="616" fill="#1aa6b7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="900">液化</text>
    <path d="M334 320 C552 104 1036 96 1188 188" fill="none" stroke="#ef6f61" stroke-width="7" stroke-linecap="round" stroke-dasharray="16 16" marker-end="url(#arrowHot)"/>
    <text x="716" y="102" fill="#ef6f61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="900">升华</text>
    <path d="M1190 544 C958 744 524 740 322 492" fill="none" stroke="#1aa6b7" stroke-width="7" stroke-linecap="round" stroke-dasharray="16 16" marker-end="url(#arrowCold)"/>
    <text x="720" y="780" fill="#1aa6b7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="900">凝华</text>
  </g>
</svg>
