<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">测量小车平均速度实验示意图</title>
  <desc id="desc">小车沿斜面运动，刻度尺测量路程，秒表测量时间，通过 v 等于 s 除以 t 计算平均速度。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8f2f5"/>
      <stop offset="0.56" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#f5f1df"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-20%" width="136%" height="145%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#23415a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#0b7c72"/>
    </marker>
    <marker id="arrowCoral" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#ef6f61"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="112" y="104" width="1376" height="548" rx="34" fill="#ffffff" stroke="#d6e8ef" stroke-width="4" filter="url(#softShadow)"/>
  <rect x="92" y="698" width="1416" height="100" rx="30" fill="#cfe6dc"/>

  <g aria-label="斜面和小车">
    <path d="M242 574 L1190 332" fill="none" stroke="#bfd4df" stroke-width="34" stroke-linecap="round"/>
    <path d="M246 550 L1194 308" fill="none" stroke="#5a7184" stroke-width="8" stroke-linecap="round"/>
    <g transform="translate(792 332) rotate(-14)">
      <rect x="-102" y="-62" width="204" height="94" rx="24" fill="#1aa6b7" stroke="#0b7c72" stroke-width="7"/>
      <rect x="-24" y="-102" width="72" height="48" rx="16" fill="#8fd4f2" stroke="#0b7c72" stroke-width="6"/>
      <circle cx="-58" cy="42" r="29" fill="#132238"/>
      <circle cx="62" cy="42" r="29" fill="#132238"/>
      <circle cx="-58" cy="42" r="15" fill="#f8fcff"/>
      <circle cx="62" cy="42" r="15" fill="#f8fcff"/>
    </g>
    <circle cx="324" cy="552" r="10" fill="#ef6f61"/>
    <circle cx="1106" cy="352" r="10" fill="#ef6f61"/>
    <line x1="324" y1="552" x2="1106" y2="352" stroke="#ef6f61" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowCoral)"/>
    <text x="628" y="494" fill="#ef6f61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="900">路程 s</text>
  </g>

  <g aria-label="刻度尺">
    <rect x="282" y="616" width="770" height="64" rx="12" fill="#fff2a8" stroke="#d7ad3b" stroke-width="5"/>
    <g stroke="#8d6e14" stroke-width="4">
      <line x1="310" y1="616" x2="310" y2="670"/>
      <line x1="390" y1="616" x2="390" y2="652"/>
      <line x1="470" y1="616" x2="470" y2="670"/>
      <line x1="550" y1="616" x2="550" y2="652"/>
      <line x1="630" y1="616" x2="630" y2="670"/>
      <line x1="710" y1="616" x2="710" y2="652"/>
      <line x1="790" y1="616" x2="790" y2="670"/>
      <line x1="870" y1="616" x2="870" y2="652"/>
      <line x1="950" y1="616" x2="950" y2="670"/>
      <line x1="1030" y1="616" x2="1030" y2="652"/>
    </g>
    <text x="318" y="714" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="800">刻度尺测距离</text>
  </g>

  <g aria-label="秒表">
    <circle cx="1260" cy="252" r="88" fill="#ffffff" stroke="#bfd4df" stroke-width="8"/>
    <circle cx="1260" cy="252" r="48" fill="#132238"/>
    <circle cx="1260" cy="252" r="34" fill="#f8fcff"/>
    <line x1="1260" y1="252" x2="1260" y2="204" stroke="#ef6f61" stroke-width="7" stroke-linecap="round"/>
    <line x1="1260" y1="252" x2="1298" y2="272" stroke="#0b7c72" stroke-width="7" stroke-linecap="round"/>
    <rect x="1233" y="143" width="54" height="28" rx="10" fill="#bfd4df"/>
    <text x="1192" y="382" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="900">时间 t</text>
  </g>

  <g aria-label="平均速度公式">
    <rect x="238" y="184" width="344" height="128" rx="28" fill="#ffffff" stroke="#bfd4df" stroke-width="5"/>
    <text x="292" y="238" fill="#0b7c72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="900">v = s / t</text>
    <text x="292" y="280" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="800">平均速度 = 路程 ÷ 时间</text>
  </g>

  <path d="M520 256 C648 218 780 210 930 246" fill="none" stroke="#0b7c72" stroke-width="7" stroke-linecap="round" stroke-dasharray="12 14" marker-end="url(#arrowTeal)"/>
</svg>
