<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">光沿直线传播形成影子的示意图</title>
  <desc id="desc">点光源发出的光沿直线传播，不透明挡板挡住部分光线，在右侧屏幕上形成阴影。</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9f2f5"/>
      <stop offset="1" stop-color="#f7fbf4"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fcff"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightCone" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7f9aaa" flood-opacity="0.18"/>
    </filter>
    <filter id="blockShadow" x="-60%" y="-30%" width="220%" height="180%">
      <feDropShadow dx="14" dy="18" stdDeviation="11" flood-color="#26394d" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowLight" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 2 L 14 8 L 1 14 Z" fill="#ffd166"/>
    </marker>
    <marker id="arrowBlocked" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 2 L 14 8 L 1 14 Z" fill="#ef6f61"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <rect x="118" y="100" width="1364" height="560" rx="34" fill="url(#cardBg)" stroke="#d4e8ef" stroke-width="4" filter="url(#softShadow)"/>
  <rect x="92" y="708" width="1418" height="92" rx="30" fill="#cfe4da"/>

  <g aria-label="光源">
    <circle cx="275" cy="414" r="132" fill="url(#lampGlow)"/>
    <circle cx="275" cy="414" r="62" fill="#ffd166" stroke="#ef6f61" stroke-width="16"/>
    <circle cx="275" cy="414" r="90" fill="none" stroke="#ffd166" stroke-width="5" opacity="0.25"/>
  </g>

  <path d="M 337 414 L 640 298 L 1100 122 L 1100 752 L 640 548 Z" fill="url(#lightCone)"/>

  <g aria-label="不透明挡板">
    <rect x="640" y="298" width="58" height="250" rx="10" fill="#26394d" filter="url(#blockShadow)"/>
    <rect x="652" y="298" width="18" height="250" fill="#95adbc" opacity="0.62"/>
  </g>

  <g aria-label="屏幕和阴影">
    <rect x="1090" y="104" width="34" height="664" rx="13" fill="#ffffff" stroke="#bfd4df" stroke-width="5"/>
    <path d="M 1124 122 C 1176 258 1176 616 1124 752 Z" fill="#26394d" opacity="0.42"/>
    <path d="M 1124 122 C 1152 260 1153 616 1124 752 Z" fill="#26394d" opacity="0.16"/>
  </g>

  <g aria-label="直线传播光线">
    <line x1="337" y1="414" x2="1100" y2="122" stroke="#ffd166" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowLight)"/>
    <line x1="337" y1="414" x2="1100" y2="752" stroke="#ffd166" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowLight)"/>
    <line x1="337" y1="414" x2="632" y2="414" stroke="#ef6f61" stroke-width="9" stroke-linecap="round" marker-end="url(#arrowBlocked)"/>
  </g>
</svg>
