<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">质量与密度实验示意图</title>
  <desc id="desc">用天平测量同一金属块的质量，用量筒排水法测量体积，再由密度公式 rho 等于 m 除以 V 得到密度。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8f1f4"/>
      <stop offset="0.56" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#f5f1df"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#32c4d0" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#0b8b9a" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-20%" width="136%" height="145%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#23415a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#ef6f61"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="112" y="104" width="1376" height="548" rx="34" fill="#ffffff" stroke="#d6e8ef" stroke-width="4" filter="url(#softShadow)"/>
  <rect x="92" y="698" width="1416" height="100" rx="30" fill="#cfe6dc"/>

  <g aria-label="天平测质量">
    <line x1="206" y1="360" x2="638" y2="360" stroke="#132238" stroke-width="16" stroke-linecap="round"/>
    <line x1="422" y1="360" x2="422" y2="626" stroke="#5a7184" stroke-width="18"/>
    <rect x="302" y="620" width="240" height="44" rx="18" fill="#5a7184"/>
    <path d="M255 360 L178 506 M255 360 L332 506" fill="none" stroke="#5a7184" stroke-width="7" stroke-linecap="round"/>
    <path d="M590 360 L512 506 M590 360 L668 506" fill="none" stroke="#5a7184" stroke-width="7" stroke-linecap="round"/>
    <rect x="152" y="500" width="226" height="68" rx="30" fill="#fff5cf" stroke="#d7ad3b" stroke-width="6"/>
    <rect x="486" y="500" width="226" height="68" rx="30" fill="#fff5cf" stroke="#d7ad3b" stroke-width="6"/>
    <rect x="218" y="442" width="72" height="72" rx="12" fill="#1aa6b7" stroke="#0b7c72" stroke-width="5"/>
    <circle cx="598" cy="472" r="42" fill="#ffd166" stroke="#d7ad3b" stroke-width="5"/>
    <rect x="654" y="456" width="34" height="58" rx="8" fill="#ffd166" stroke="#d7ad3b" stroke-width="5"/>
    <text x="182" y="286" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="900">测质量 m</text>
    <text x="184" y="330" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="800">左物右码，读出物体质量</text>
  </g>

  <g aria-label="排水法测体积">
    <path d="M930 234 L1124 234 C1152 234 1170 252 1170 280 L1170 600 C1170 630 1150 650 1120 650 L934 650 C904 650 884 630 884 600 L884 280 C884 252 902 234 930 234 Z" fill="#f8fdff" stroke="#9bb8c5" stroke-width="7"/>
    <ellipse cx="1027" cy="234" rx="98" ry="24" fill="#f8fdff" stroke="#9bb8c5" stroke-width="7"/>
    <path d="M906 498 C950 474 1105 474 1148 498 L1148 628 L906 628 Z" fill="url(#water)"/>
    <path d="M906 424 C950 400 1105 400 1148 424" fill="none" stroke="#ef6f61" stroke-width="7" stroke-linecap="round"/>
    <path d="M906 498 C950 474 1105 474 1148 498" fill="none" stroke="#0b7c72" stroke-width="7" stroke-linecap="round"/>
    <rect x="986" y="368" width="78" height="154" rx="15" fill="#ef6f61" opacity="0.92"/>
    <g stroke="#5f6f82" stroke-width="5" stroke-linecap="round">
      <line x1="1170" y1="300" x2="1218" y2="300"/>
      <line x1="1170" y1="356" x2="1200" y2="356"/>
      <line x1="1170" y1="412" x2="1218" y2="412"/>
      <line x1="1170" y1="468" x2="1200" y2="468"/>
      <line x1="1170" y1="524" x2="1218" y2="524"/>
      <line x1="1170" y1="580" x2="1200" y2="580"/>
    </g>
    <text x="875" y="176" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="900">测体积 V</text>
    <text x="874" y="214" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="800">水面升高量就是物体体积</text>
    <text x="1228" y="429" fill="#ef6f61" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="900">放入后</text>
    <text x="1228" y="504" fill="#0b7c72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="900">原水面</text>
  </g>

  <line x1="734" y1="454" x2="830" y2="454" stroke="#ef6f61" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="1212" y="158" width="190" height="118" rx="24" fill="#ffffff" stroke="#bfd4df" stroke-width="5"/>
  <text x="1246" y="210" fill="#0b7c72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="31" font-weight="900">ρ = m / V</text>
  <text x="1248" y="248" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="800">质量 ÷ 体积</text>
</svg>
