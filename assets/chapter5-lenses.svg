<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">凸透镜成倒立实像光路图</title>
  <desc id="desc">物体位于凸透镜二倍焦距以外，三条特殊光线经过凸透镜后会聚，在右侧光屏上形成倒立缩小实像。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d7f1f4"/>
      <stop offset="0.55" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f7f4e8"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" x2="1">
      <stop offset="0" stop-color="#53c8d2" stop-opacity="0.32"/>
      <stop offset="0.5" stop-color="#16a6b8" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#53c8d2" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#23415a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#0b7c72"/>
    </marker>
    <marker id="arrowCoral" markerWidth="14" markerHeight="14" refX="12" refY="7" viewBox="0 0 14 14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#ef6f61"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="120" y="112" width="1360" height="536" rx="32" fill="#fff" filter="url(#softShadow)" stroke="#d8e8ef" stroke-width="3"/>
  <rect x="92" y="690" width="1416" height="108" rx="30" fill="#cfe8dd"/>

  <line x1="250" y1="420" x2="1260" y2="420" stroke="#c8d9e2" stroke-width="5"/>
  <line x1="760" y1="178" x2="760" y2="622" stroke="#7eb7c7" stroke-width="4"/>
  <ellipse cx="760" cy="420" rx="52" ry="224" fill="url(#lens)" stroke="#0f9daf" stroke-width="6"/>

  <line x1="630" y1="405" x2="630" y2="435" stroke="#ef6f61" stroke-width="5"/>
  <line x1="890" y1="405" x2="890" y2="435" stroke="#ef6f61" stroke-width="5"/>
  <circle cx="630" cy="420" r="8" fill="#ef6f61"/>
  <circle cx="890" cy="420" r="8" fill="#ef6f61"/>
  <text x="616" y="470" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="800">F</text>
  <text x="876" y="470" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="800">F</text>
  <text x="700" y="160" fill="#0b7c72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="900">凸透镜</text>

  <line x1="430" y1="420" x2="430" y2="310" stroke="#132238" stroke-width="9" marker-end="url(#arrowTeal)"/>
  <text x="388" y="290" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="900">物体</text>
  <line x1="975" y1="270" x2="975" y2="575" stroke="#bfd4df" stroke-width="16" stroke-linecap="round"/>
  <text x="930" y="250" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="900">光屏</text>
  <line x1="975" y1="420" x2="975" y2="492" stroke="#132238" stroke-width="8" marker-end="url(#arrowCoral)"/>
  <text x="1010" y="510" fill="#132238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="900">倒立缩小实像</text>

  <path d="M430 310 L760 310 L975 492" fill="none" stroke="#0b7c72" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>
  <path d="M430 310 L975 492" fill="none" stroke="#1aa6b7" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <path d="M430 310 L760 492 L975 492" fill="none" stroke="#ef6f61" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowCoral)"/>
  <circle cx="975" cy="492" r="11" fill="#132238"/>

  <text x="1016" y="352" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="800">平行光经凸透镜后过焦点</text>
  <text x="264" y="596" fill="#5f6f82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="800">过光心的光线方向不改变</text>
</svg>
